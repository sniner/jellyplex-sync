name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: https://github.com/astral-sh/setup-uv@v5

      - name: Run Tests
        run: uv run pytest

  build-and-release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: https://github.com/astral-sh/setup-uv@v5

      - name: Build Packages
        run: uv build

      - name: Generate release notes from commit log
        run: |
          prev_tag=$(git describe --tags --abbrev=0 --match='v*' "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          if [ -n "$prev_tag" ]; then
              range="${prev_tag}..${GITHUB_REF_NAME}"
              echo "## Changes since ${prev_tag}" > release-notes.md
          else
              range="${GITHUB_REF_NAME}"
              echo "## Initial release" > release-notes.md
          fi
          echo "" >> release-notes.md
          git log --no-merges --pretty='- %s' "$range" >> release-notes.md
          echo "--- release-notes.md ---"
          cat release-notes.md

      - name: Create Release
        uses: https://github.com/softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
